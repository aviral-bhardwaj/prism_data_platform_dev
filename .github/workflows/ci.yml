name: CI - Prism Data Platform

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-bugbear

      - name: Run flake8 on data_platform source
        run: |
          flake8 data_platform/src/ \
            --config=.flake8 \
            --count --statistics

      - name: Run flake8 on utils
        run: |
          flake8 utils/ \
            --config=.flake8 \
            --count --statistics

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest "pyspark>=3.5,<3.6" "delta-spark>=3.2,<3.3" msal requests chardet

      - name: Run unit tests
        working-directory: data_platform
        run: |
          python -m pytest tests/ --ignore=tests/integration/ -v --tb=short --junitxml=test-results/unit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: data_platform/test-results/
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest "pyspark>=3.5,<3.6" "delta-spark>=3.2,<3.3" requests msal chardet

      - name: Run integration tests
        working-directory: data_platform
        run: |
          python -m pytest tests/integration/ -v --tb=short --junitxml=test-results/integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: data_platform/test-results/
          if-no-files-found: ignore

  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Build wheel
        working-directory: data_platform
        run: python setup.py bdist_wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-platform-wheel
          path: data_platform/dist/*.whl
