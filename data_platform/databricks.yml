# This is a Databricks asset bundle definition for data_plat_demo.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: data_platform
  uuid: 357d5e34-a0ad-43d8-a809-108f8ed736f6


variables:
  JOB_SUFFIX:
    default: ""

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    variables:
      JOB_SUFFIX: "_dev"
    workspace:
      host: https://adb-8113998438771711.11.azuredatabricks.net

  prod:
    mode: production
    variables:
      JOB_SUFFIX: ""
    workspace:
      host: https://adb-8113998438771711.11.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/guilherme.vertamatti@bain.com to make sure we only have a single copy.
      root_path: /Workspace/Users/guilherme.vertamatti@bain.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: guilherme.vertamatti@bain.com
        level: CAN_MANAGE
