# The main job for data_plat_demo.
resources:
  jobs:
    Data_Platform_Bronze_Source_Ingestion_per_Survey:
      name: Data_Platform_Bronze_Source_Ingestion_per_Survey
      tasks:
        - task_key: source_to_landing_survey_datamap_endpoint
          notebook_task:
            notebook_path: ../src/bronze_layer_scripts/dcp_002_source_to_landing_survey_datamap_endpoint.py
            source: WORKSPACE
          job_cluster_key: job_cluster
          # existing_cluster_id: 0820-164914-ytaa5wz3
        - task_key: source_to_landing_files_endpoint
          depends_on:
            - task_key: source_to_landing_survey_datamap_endpoint
          notebook_task:
            notebook_path: ../src/bronze_layer_scripts/dcp_003_source_to_landing_files_endpoint.py
            source: WORKSPACE
          job_cluster_key: job_cluster
          # existing_cluster_id: 0820-164914-ytaa5wz3
        - task_key: source_to_landing_survey_layouts_endpoint
          depends_on:
            - task_key: source_to_landing_survey_responses_endpoint
          notebook_task:
            notebook_path: ../src/bronze_layer_scripts/dcp_005_source_to_landing_survey_layouts_endpoint.py
            source: WORKSPACE
          job_cluster_key: job_cluster
          # existing_cluster_id: 0820-164914-ytaa5wz3
        - task_key: source_to_landing_survey_responses_endpoint
          depends_on:
            - task_key: source_to_landing_files_endpoint
          notebook_task:
            notebook_path: ../src/bronze_layer_scripts/dcp_004_source_to_landing_survey_responses_endpoint.py
            source: WORKSPACE
          job_cluster_key: job_cluster
          # existing_cluster_id: 0820-164914-ytaa5wz3
      job_clusters:
        - job_cluster_key: job_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS4_v2
            data_security_mode: SINGLE_USER
            autoscale:
              min_workers: 1
              max_workers: 4
      
      queue:
        enabled: true
      parameters:
        - name: config_input
          default: "{{item}}"


